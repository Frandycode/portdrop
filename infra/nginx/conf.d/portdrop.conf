upstream dashboard {
  # Next.js dev server running on the host machine
  server host.docker.internal:3001;
}

# Phase 2 — WebSocket relay (Node.js)
# upstream relay {
#   server host.docker.internal:3002;
# }

# Phase 2 — FastAPI backend
# upstream api {
#   server host.docker.internal:8000;
# }

server {
  listen 80;
  server_name localhost;

  # ── Health check endpoint ─────────────────────────────────────────────────
  location = /health {
    access_log off;
    return 200 "portdrop-nginx ok\n";
    add_header Content-Type text/plain;
  }

  # ── Session viewer pages  /s/* ────────────────────────────────────────────
  location /s/ {
    proxy_pass http://dashboard;
  }

  # ── Next.js API routes  /api/* ────────────────────────────────────────────
  location /api/ {
    proxy_pass http://dashboard;
  }

  # ── Next.js HMR websocket (dev only) ─────────────────────────────────────
  location /_next/webpack-hmr {
    proxy_pass http://dashboard;
  }

  # ── Next.js static assets ─────────────────────────────────────────────────
  location /_next/ {
    proxy_pass http://dashboard;
    proxy_cache_valid 200 1d;
    add_header Cache-Control "public, max-age=86400, immutable";
  }

  # ── Phase 2 placeholder — WebSocket relay ─────────────────────────────────
  # location /ws/ {
  #   proxy_pass http://relay;
  # }

  # ── Phase 2 placeholder — FastAPI backend ─────────────────────────────────
  # location /backend/ {
  #   proxy_pass http://api;
  # }

  # ── Root — dashboard home ─────────────────────────────────────────────────
  location / {
    proxy_pass http://dashboard;
  }
}
