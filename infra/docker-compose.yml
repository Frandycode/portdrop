services:
  nginx:
    image: nginx:1.25-alpine
    container_name: portdrop-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    restart: unless-stopped
    extra_hosts:
      # Lets Nginx resolve the host machine's localhost from inside the container
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  default:
    name: portdrop-network
