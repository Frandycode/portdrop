<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none">
  <!-- Circle -->
  <circle cx="12" cy="12" r="10.5" stroke="#38BDF8" stroke-width="1.2" fill="none"/>
  <!-- Plug body -->
  <rect x="7.5" y="3.5" width="9" height="6.5" rx="1.2" stroke="#38BDF8" stroke-width="1.2"/>
  <!-- Prongs -->
  <line x1="9.5"  y1="10" x2="9.5"  y2="13" stroke="#38BDF8" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="14.5" y1="10" x2="14.5" y2="13" stroke="#38BDF8" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Dash connector -->
  <line x1="12" y1="13" x2="12" y2="14.5" stroke="#38BDF8" stroke-width="1.2" stroke-dasharray="1.5,1.5" opacity="0.6"/>
  <!-- Socket -->
  <rect x="6.5" y="14.5" width="11" height="6.5" rx="1.5" stroke="#38BDF8" stroke-width="1.2"/>
  <rect x="8.5"  y="16"  width="3"  height="4"   rx="0.6" fill="#38BDF8" opacity="0.9"/>
  <rect x="12.5" y="16"  width="3"  height="4"   rx="0.6" fill="#38BDF8" opacity="0.9"/>
</svg>
